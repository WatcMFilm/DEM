  <body>
    <main class="container">
      <section class="card">
        <div class="brand">
          <h1>Watc<span class="indam">MF</span>im</h1>
          <p>Khôi phục mật khẩu của bạn.</p>
        </div>

        <nav class="link-row" style="margin-bottom: 20px">
          <a href="../trangchu/DEMO_Cuoiky.html">Trang chủ</a>
          <a href="../Theloai/theloai.html">Thể loại</a>
          <a href="../Quocgia/quocgia.html">Quốc gia</a>
        </nav>

        <form>
          <div class="form-group">
            <label for="email">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              placeholder="Nhập email của bạn"
              required
            />
          </div>

          <button class="action-btn" type="submit">
            Gửi yêu cầu khôi phục
          </button>

          <p class="help-text">
            Chúng tôi sẽ gửi hướng dẫn khôi phục mật khẩu đến email của bạn.
          </p>

          <div class="link-row">
            <a href="../login/login.html">Quay lại đăng nhập</a>
            <a href="../login/register.html">Tạo tài khoản mới</a>
          </div>
        </form>
      </section>

      <div class="ocean">
        Lan tỏa trải nghiệm tối thượng, truy cập nhanh chóng và an toàn.
      </div>
    </main>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const form = document.querySelector("form");
        if (!form) return;

        form.addEventListener("submit", function (event) {
          event.preventDefault();
          alert(
            "Yêu cầu khôi phục mật khẩu đã được gửi. Vui lòng kiểm tra email của bạn.",
          );
        });
      });
    </script>
