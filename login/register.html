  <body>
    <main class="container">
      <section class="card">
        <div class="brand">
          <h1>Watc<span class="indam">MF</span>im</h1>
          <p>Tham gia cộng đồng xem phim chất lượng cao ngay hôm nay.</p>
        </div>

        <nav class="link-row" style="margin-bottom: 20px">
          <a href="../trangchu/DEMO_Cuoiky.html">Trang chủ</a>
          <a href="../Theloai/theloai.html">Thể loại</a>
          <a href="../Quocgia/quocgia.html">Quốc gia</a>
        </nav>

        <form>
          <div class="form-group">
            <label for="name">Họ và tên</label>
            <input
              id="name"
              name="name"
              type="text"
              placeholder="Nhập họ tên"
              required
            />
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              placeholder="Nhập email"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Mật khẩu</label>
            <input
              id="password"
              name="password"
              type="password"
              placeholder="Tạo mật khẩu"
              required
            />
          </div>

          <div class="form-group">
            <label for="confirm-password">Xác nhận mật khẩu</label>
            <input
              id="confirm-password"
              name="confirm-password"
              type="password"
              placeholder="Nhập lại mật khẩu"
              required
            />
          </div>

          <button class="action-btn" type="submit">Đăng ký</button>
          <p class="help-text">
            Bấm đăng ký tức là bạn đã đồng ý với điều khoản và chính sách bảo
            mật.
          </p>

          <div class="link-row">
            <a href="login.html">Đã có tài khoản? Đăng nhập</a>
          </div>
        </form>
      </section>

      <div class="ocean">
        Phong cách dark luxury, thiết kế tối đa hoá trải nghiệm người dùng.
      </div>
    </main>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const form = document.querySelector("form");
        if (!form) return;

        form.addEventListener("submit", function (event) {
          event.preventDefault();
          localStorage.setItem("isLoggedIn", "true");
          window.location.href = "../trangchu/DEMO_Cuoiky.html";
        });
      });
    </script>
  </body>
